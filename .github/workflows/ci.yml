name: CI — portfolio build

# Validates the portfolio on every push/PR that touches web/: install, lint,
# typecheck and a full production build. This does NOT deploy — the site is
# self-hosted (systemd DefaultWeb.service) and updated on the server itself
# (see web/README.md, "Deploying"). CI just guarantees main always builds.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# Least privilege: this job only reads the checked-out code — it never pushes,
# comments or deploys. Restrict the automatic GITHUB_TOKEN accordingly so a
# compromised dependency in CI cannot use it to write to the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
