name: Deploy portfolio to Cloudflare Pages

# Optional in-repo CI/CD. Cloudflare Pages' native Git integration (see
# web/README.md, Option A) is an alternative that needs no workflow at all.
#
# Requires two repository secrets:
#   CLOUDFLARE_API_TOKEN   – token with "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID  – your Cloudflare account id
# And a Pages project named "ruthgyeul" (create it once in the dashboard or via
# `npx wrangler pages project create ruthgyeul`).

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Only the latest run for a ref needs to finish.
concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy out --project-name=ruthgyeul --branch=main
